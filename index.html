<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdes Campos FM - A Região Se Liga Aqui!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a4d2e 50%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .radio-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .radio-icon {
            width: 100%;
            max-width: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
        }

        .radio-icon img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(16, 185, 129, 0.3));
        }

        .radio-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .radio-tagline {
            font-size: 16px;
            color: #a7f3d0;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-badge.active {
            opacity: 1;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .player-section {
            margin-bottom: 32px;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 32px;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(16, 185, 129, 0.5);
        }

        .play-button:active {
            transform: scale(0.98);
        }

        .play-button.playing {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
        }

        .play-button svg {
            width: 40px;
            height: 40px;
            fill: white;
            margin-left: 4px;
        }

        .play-button.playing svg {
            margin-left: 0;
        }

        .equalizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
            margin-bottom: 32px;
        }

        .bar {
            width: 6px;
            background: linear-gradient(to top, #10b981, #34d399);
            border-radius: 3px;
            height: 8px;
            transition: height 0.1s ease;
        }

        .equalizer.active .bar:nth-child(1) { animation: eq1 0.4s infinite alternate; }
        .equalizer.active .bar:nth-child(2) { animation: eq2 0.5s infinite alternate; }
        .equalizer.active .bar:nth-child(3) { animation: eq3 0.35s infinite alternate; }
        .equalizer.active .bar:nth-child(4) { animation: eq4 0.45s infinite alternate; }
        .equalizer.active .bar:nth-child(5) { animation: eq5 0.55s infinite alternate; }

        @keyframes eq1 { to { height: 40px; } }
        @keyframes eq2 { to { height: 25px; } }
        @keyframes eq3 { to { height: 35px; } }
        @keyframes eq4 { to { height: 20px; } }
        @keyframes eq5 { to { height: 30px; } }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .volume-icon {
            font-size: 24px;
            opacity: 0.8;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #10b981;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.5);
        }

        .volume-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #10b981;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.5);
        }

        .listen-button {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.5);
            border-radius: 16px;
            color: #34d399;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .listen-button:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }

        .error-message {
            text-align: center;
            color: #fca5a5;
            font-size: 14px;
            margin-top: 20px;
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .error-message a {
            color: #34d399;
            text-decoration: underline;
            margin-top: 8px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 24px;
            }

            .radio-icon {
                max-width: 280px;
            }

            .play-button {
                width: 88px;
                height: 88px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="radio-header">
            <div class="radio-icon">
                <img src="LOGO.png" alt="Rádio Verdes Campos FM">
            </div>
            <p class="radio-tagline">A Região Se Liga Aqui!</p>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                AO VIVO
            </div>
        </div>

        <div class="player-section">
            <div class="equalizer" id="equalizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <button class="play-button" id="playButton">
                <svg viewBox="0 0 24 24" id="playIcon">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>

            <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>

        <button class="listen-button" id="listenButton">Ouvir Agora</button>

        <div class="error-message" id="errorMessage">
            Ops! Não foi possível carregar o stream. Por favor, verifique sua conexão e tente novamente.
        </div>
    </div>

    <audio id="audioPlayer" preload="none">
        <source src="https://server15.srvsh.com.br:8022/stream" type="audio/mpeg">
        Seu navegador não suporta o player de áudio.
    </audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const playButton = document.getElementById('playButton');
        const playIcon = document.getElementById('playIcon');
        const statusBadge = document.getElementById('statusBadge');
        const equalizer = document.getElementById('equalizer');
        const volumeSlider = document.getElementById('volumeSlider');
        const listenButton = document.getElementById('listenButton');
        const errorMessage = document.getElementById('errorMessage');

        let isPlaying = false;

        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
            } else {
                audioPlayer.play().catch(() => {
                    errorMessage.classList.add('show');
                });
            }
        }

        function updatePlayButton() {
            if (isPlaying) {
                playButton.classList.add('playing');
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                statusBadge.classList.add('active');
                equalizer.classList.add('active');
                listenButton.textContent = 'Parar';
            } else {
                playButton.classList.remove('playing');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                statusBadge.classList.remove('active');
                equalizer.classList.remove('active');
                listenButton.textContent = 'Ouvir Agora';
            }
        }

        audioPlayer.onplay = () => {
            isPlaying = true;
            updatePlayButton();
            errorMessage.classList.remove('show');
        };

        audioPlayer.onpause = () => {
            isPlaying = false;
            updatePlayButton();
        };

        audioPlayer.onerror = () => {
            errorMessage.classList.add('show');
            isPlaying = false;
            updatePlayButton();
        };

        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value;
        });

        audioPlayer.volume = volumeSlider.value;

        playButton.addEventListener('click', togglePlay);
        listenButton.addEventListener('click', togglePlay);
    </script>
</body>
</html>
